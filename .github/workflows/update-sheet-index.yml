name: Update Galpopath sheet index

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'

concurrency:
  group: galpopath-data-updates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-sheet-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate sheet JSON files
        env:
          SHEET_API_URL: ${{ secrets.SHEET_API_URL }}
        run: node scripts/update-sheet-index.cjs

      - name: Commit updated sheet JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sheets/*.json
          git diff --cached --quiet && echo "No sheet changes to commit" || git commit -m "Update Galpopath sheet index"
          git push
